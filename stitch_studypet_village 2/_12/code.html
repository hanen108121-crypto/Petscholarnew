<script>
const defaultQuestions = {
    kvl: {
        title: "求救：克希荷夫電壓定律 (KVL) 在複雜迴路中的應用",
        author: "學霸小明",
        dept: "電機工程系",
        time: "2 小時前",
        bounty: 50,
        content: "在做這週的電路學作業時遇到瓶頸。當有三個互相重疊的網目時，聯立方程式總是解不出正確的電流值。有人可以幫忙看一下我的列式哪裡出錯了嗎？附上電路圖...",
        tags: ["Circuits", "Homework", "EE101"],
        replies: [
            { author: "電機系學霸", dept: "電機工程系", content: "建議使用節點電壓法 (Nodal Analysis) 來驗證！有時候網目電流法正負號很容易寫錯，節點電壓法列出的方程式較少，通常更不容易出錯。", time: "1 小時前" },
            { author: "助教小陳", dept: "電子工程系 TA", content: "注意正負號！順時針繞行時，若遇到電壓源從負極到正極，是電壓上升，列式要記為正值；若是流經電阻則是電壓下降。另外，共用支路的電流方向要特別小心代入。", time: "30 分鐘前" }
        ]
    },
    dtft: {
        title: "離散時間傅立葉轉換 (DTFT) 的收斂條件探討",
        author: "理科太太的貓",
        dept: "資訊工程系",
        time: "昨天",
        bounty: 80,
        content: "關於絕對可加總(Absolutely Summable)序列在推導DTFT時的必要性，課堂上提到這保證了轉換的存在且連續。但如果是平方可加總(Square Summable)序列呢？其收斂情況會怎麼變化？",
        tags: ["Signals", "Math"],
        replies: [
            { author: "數學系高手", dept: "應用數學系", content: "如果序列是平方可加總的 (即能量有限)，其 DTFT 仍然存在，但收斂是在均方意義上 (Mean-Square Convergence) 的收斂，而不是絕對收斂。這時候可能在某些點會有吉布斯現象 (Gibbs Phenomenon)，不一定保證處處連續性喔！", time: "12 小時前" }
        ]
    },
    carnot: {
        title: "[高懸賞] 卡諾熱機效率與熵增原理的綜合計算題",
        author: "熱力學苦主",
        dept: "機械工程系",
        time: "3 小時前",
        bounty: 200,
        content: "這題期中考考古題想了很久都想不通。假設有一個非理想的熱機，其排出的熱量一部分被用來加熱另一個系統，請問總體的熵變化量該如何定義系統邊界來計算？",
        tags: ["Thermodynamics", "Physics", "急件"],
        replies: []
    }
};

let currentPost = null;
let currentPostId = "";
let currentUser = { username: "新同學", department: "請選擇系所" };

document.addEventListener("DOMContentLoaded", () => {
    // Load currentUser
    const savedUser = localStorage.getItem("studypet_user");
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById("reply-author").value = `${currentUser.username} (${currentUser.department})`;
    }

    // Get URL search parameters
    const params = new URLSearchParams(window.location.search);
    currentPostId = params.get('id') || 'kvl';

    // Fetch post details
    let customPosts = JSON.parse(localStorage.getItem("studypet_custom_posts") || "[]");

    if (currentPostId === 'kvl' || currentPostId === 'dtft' || currentPostId === 'carnot') {
        currentPost = defaultQuestions[currentPostId];
    } else {
        const idx = parseInt(currentPostId, 10);
        if (!isNaN(idx) && customPosts[idx]) {
            const custom = customPosts[idx];
            currentPost = {
                title: custom.title,
                author: custom.authorName || currentUser.username,
                dept: custom.deptName || currentUser.department,
                time: custom.timestamp || "剛剛",
                bounty: custom.bounty || 10,
                content: custom.content,
                tags: [custom.boardName, custom.deptName, `Bounty${custom.bounty}`].filter(Boolean),
                replies: [],
                image: custom.image || null
            };
        }
    }

    if (!currentPost) {
        alert("找不到此提問文章！");
        window.location.href = "../_5/code.html";
        return;
    }

    // Save active post details to localStorage for the visualizer tree
    const savedReplies = JSON.parse(localStorage.getItem(`studypet_replies_${currentPostId}`) || "[]");
    localStorage.setItem("studypet_active_post", JSON.stringify({
        id: currentPostId,
        title: currentPost.title,
        author: currentPost.author,
        replies: (currentPost.replies || []).concat(savedReplies)
    }));

    // Render post detail
    renderPostDetail();
    // Render replies list
    renderReplies();
});

function renderPostDetail() {
    const container = document.getElementById("post-detail-container");
    
    let tagsHtml = "";
    currentPost.tags.forEach(t => {
        tagsHtml += `<span class="px-sm py-[2px] bg-secondary-container text-on-secondary-container rounded-sm font-label-md text-label-md text-[11px]">#${t}</span> `;
    });

    const isCustomPost = (currentPostId !== 'kvl' && currentPostId !== 'dtft' && currentPostId !== 'carnot');
    let deleteHtml = "";
    if (isCustomPost) {
        deleteHtml = `
            <button onclick="deleteCustomPost()" class="flex items-center gap-xs text-red-600 dark:text-red-400 font-medium hover:underline bg-red-100 dark:bg-red-950/40 px-2.5 py-[4px] rounded-full text-xs transition-colors mr-2">
                <span class="material-symbols-outlined text-[16px]">delete</span>
                <span>刪除此文 (扣 10 金幣)</span>
            </button>
        `;
    }

    container.innerHTML = `
<div class="flex flex-col gap-md">
    <div class="flex items-center justify-between border-b border-outline-variant pb-sm">
        <div class="flex items-center gap-sm text-secondary font-label-md text-label-md">
            <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-on-secondary-container text-[18px]">person</span>
            </div>
            <div>
                <div class="text-on-surface font-bold text-[14px]">${currentPost.author}</div>
                <div class="text-[11px] text-secondary">${currentPost.dept} • ${currentPost.time}</div>
            </div>
        </div>
        <div class="flex items-center gap-xs">
            ${deleteHtml}
            <div class="flex items-center gap-xs bg-tertiary-container text-on-tertiary-container px-md py-[4px] rounded-full shadow-sm border border-outline-variant/20">
                <span class="material-symbols-outlined text-[16px]">generating_tokens</span>
                <span class="font-label-md text-label-md font-bold">💰 懸賞 ${currentPost.bounty}</span>
            </div>
        </div>
    </div>
    
    <h2 class="font-headline-lg text-headline-md text-primary font-bold text-[24px] mt-sm">${currentPost.title}</h2>
    
    <p class="text-on-surface-variant font-body-md text-body-lg leading-relaxed whitespace-pre-wrap py-md">
        ${currentPost.content}
    </p>
    ${currentPost.image ? `<div class="post-attached-image rounded-xl border border-outline-variant bg-white p-sm"><img src="${currentPost.image}" alt="提問附圖" class="max-h-[360px] w-full object-contain rounded-lg"/></div>` : ""}
    
    <div class="flex flex-wrap gap-xs pt-sm">
        ${tagsHtml}
    </div>
</div>`;
}

function deleteCustomPost() {
    let pet = JSON.parse(localStorage.getItem("studypet_pet")) || { coins: 100 };
    if ((pet.coins || 0) < 10) {
        alert("您的金幣不足 10 枚，無法刪除貼文喔！");
        return;
    }
    
    if (!confirm("確定要刪除此貼文嗎？\n（此操作將會扣除 10 金幣）")) {
        return;
    }
    
    pet.coins = (pet.coins || 0) - 10;
    pet.lastActivityTime = Date.now();
    localStorage.setItem("studypet_pet", JSON.stringify(pet));
    
    let customPosts = JSON.parse(localStorage.getItem("studypet_custom_posts") || "[]");
    const idx = parseInt(currentPostId, 10);
    if (!isNaN(idx) && customPosts[idx]) {
        customPosts.splice(idx, 1);
        localStorage.setItem("studypet_custom_posts", JSON.stringify(customPosts));
    }
    
    alert("貼文已成功刪除，並扣除 10 枚金幣。");
    window.location.href = "../_5/code.html";
}

function renderReplies() {
    const listContainer = document.getElementById("replies-list");
    const countSpan = document.getElementById("replies-count");

    // Fetch custom replies from localStorage
    const savedReplies = JSON.parse(localStorage.getItem(`studypet_replies_${currentPostId}`) || "[]");
    const allReplies = [...(currentPost.replies || []), ...savedReplies];

    countSpan.textContent = allReplies.length;

    if (allReplies.length === 0) {
        listContainer.innerHTML = `
        <div class="bg-surface-container rounded-lg p-lg text-center border border-dashed border-outline-variant">
            <span class="material-symbols-outlined text-outline text-4xl" style="font-size: 40px;">rate_review</span>
            <p class="font-body-md text-body-md text-secondary mt-sm">目前尚無解答。快來發表解答，幫助同學並獲得懸賞金幣吧！</p>

function submitReply() {
    const content = document.getElementById("reply-content").value.trim();
    if (!content) {
        alert("請輸入解答內容！");
        return;
    }

    const newReply = {
        author: currentUser.username,
        dept: currentUser.department,
        content: content,
        time: "剛剛"
    };

    // Save to localStorage
    const savedReplies = JSON.parse(localStorage.getItem(`studypet_replies_${currentPostId}`) || "[]");
    savedReplies.push(newReply);
    localStorage.setItem(`studypet_replies_${currentPostId}`, JSON.stringify(savedReplies));

    // Award Bounty coins
    let pet = JSON.parse(localStorage.getItem("studypet_pet")) || { coins: 100 };
    const awardAmount = currentPost.bounty;
    pet.coins = (pet.coins || 100) + awardAmount;
    pet.lastActivityTime = Date.now();
    pet.baseHp = pet.hp || 500;

    // Increment user qaCount and level up check
    let user = JSON.parse(localStorage.getItem("studypet_user")) || { qaCount: 0 };
    user.qaCount = (user.qaCount || 0) + 1;
    let leveledUp = false;
    if (user.qaCount % 3 === 0) {

        leveledUp = true;
    }
    localStorage.setItem("studypet_user", JSON.stringify(user));

    document.getElementById("reply-content").value = "";
    alert(`成功發表解答！幫助他人獲得了學術讚譽，榮獲懸賞 ${awardAmount} 金幣！${leveledUp ? `\n恭喜！您的等級提升為 Lv. ${user.level}！` : ""}`);
    
    // Refresh to show answer and update coins in sidebar
    window.location.reload();
}

<script id="global-coin-live-sync">
(function () {
  function readPet() {
    let pet;
    try { pet = JSON.parse(localStorage.getItem("studypet_pet") || "{}"); } catch (e) { pet = {}; }
    if (typeof pet.coins !== "number") pet.coins = Number(pet.coins || 120);
    if (!pet.hp) pet.hp = 500;
    if (!pet.maxHp) pet.maxHp = 500;
    localStorage.setItem("studypet_pet", JSON.stringify(pet));
    return pet;
  }

  function syncCoins() {
    const pet = readPet();
    const coins = Number(pet.coins) || 0;

    document.querySelectorAll(".global-coin-display, [data-coin-balance]").forEach(el => {
      el.textContent = coins;
    });

    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent || ["SCRIPT", "STYLE", "TEXTAREA", "INPUT", "OPTION"].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    let node;
    while ((node = walker.nextNode())) {
      const text = node.nodeValue;
      if (/金幣\s*[:：]\s*\d+/.test(text)) {
        node.nodeValue = text.replace(/(金幣\s*[:：]\s*)\d+/, `$1${coins}`);
      } else if (/餘額\s*[:：]\s*\d+\s*枚?金幣/.test(text)) {
        node.nodeValue = text.replace(/(餘額\s*[:：]\s*)\d+(\s*枚?金幣)/, `$1${coins}$2`);
      } else if (/Coins\s*[:：]\s*\d+/i.test(text)) {
        node.nodeValue = text.replace(/(Coins\s*[:：]\s*)\d+/i, `$1${coins}`);
      }
    }

    // 個人檔案統計卡：總金幣 / Coins
    document.querySelectorAll(".bg-surface.rounded-lg.p-md, .bg-surface-container-lowest, .bg-surface-container-high, .rounded-lg").forEach(card => {
      const label = Array.from(card.querySelectorAll("span,p,div")).find(el => /總金幣|目前金幣|Coins/.test(el.textContent || ""));
      if (!label) return;
      const candidates = Array.from(card.querySelectorAll(".text-on-surface, .text-primary, .font-bold, span, p")).filter(el => /^\d+$/.test((el.textContent || "").trim()));
      if (candidates[0]) candidates[0].textContent = coins;
    });
  }

  const originalSetItem = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSetItem.apply(this, arguments);
    if (key === "studypet_pet") setTimeout(syncCoins, 0);
  };

  window.syncPetScholarCoins = syncCoins;
  document.addEventListener("DOMContentLoaded", syncCoins);
  window.addEventListener("pageshow", syncCoins);
  window.addEventListener("storage", e => { if (e.key === "studypet_pet") syncCoins(); });
})();
</script>


<script id="petscholar-nav-cleanup">
document.addEventListener("DOMContentLoaded", () => {
  const applyNavCleanup = () => {
    document.querySelectorAll('a').forEach(a => {
      if ((a.textContent || '').trim().includes('資料結構')) {
        const li = a.closest('li');
        if (li) li.remove();
        else a.remove();
      }
    });
  };
  applyNavCleanup();
  setTimeout(applyNavCleanup, 80);
  setTimeout(applyNavCleanup, 300);
});
</script>
</body>
</html>
