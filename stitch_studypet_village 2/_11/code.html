<script>
const collegeDepts = {
    cmee: ["機械工程系", "車輛工程系", "能源與冷凍空調工程系", "機電學士班"],
    ceecs: ["電機工程系", "電子工程系", "資訊工程系", "光電工程系", "電資學士班"],
    coe: ["土木工程系", "化學工程與生物科技系", "分子科學與工程系", "材料及資源工程系", "工程科技學士班"],
    com: ["工業工程與管理系", "經營管理系", "資訊與財金管理系"],
    cod: ["建築系", "工業設計系", "互動設計系", "創意設計學士班"],
    chss: ["應用英文系", "文化事業發展系"]
};

function updateDepts() {
    const boardSelect = document.getElementById("ask-board");
    const deptSelect = document.getElementById("ask-dept");
    const selectedCollege = boardSelect.value;
    const depts = collegeDepts[selectedCollege] || [];
    
    deptSelect.innerHTML = "";
    depts.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        deptSelect.appendChild(opt);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    updateDepts();
});


let askImageDataUrl = null;
let askBrushBaseUrl = null;
let askBrushCtx = null;
let askDrawing = false;
let askTool = "pen";
let askLastX = 0;
let askLastY = 0;
let askBrushHasContent = false;

function askCanvasPoint(event, canvas) {
  const rect = canvas.getBoundingClientRect();
  const clientX = event.clientX !== undefined ? event.clientX : (event.touches && event.touches[0] ? event.touches[0].clientX : 0);
  const clientY = event.clientY !== undefined ? event.clientY : (event.touches && event.touches[0] ? event.touches[0].clientY : 0);
  return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
}

function initAskBrushCanvas() {
  const canvas = document.getElementById("ask-brush-canvas");
  if (!canvas || canvas.dataset.bound === "true") return;
  canvas.dataset.bound = "true";
  askBrushCtx = canvas.getContext("2d");
  const start = e => { e.preventDefault(); askDrawing = true; const p = askCanvasPoint(e, canvas); askLastX = p.x; askLastY = p.y; };
  const move = e => {
    if (!askDrawing) return;
    e.preventDefault();
    const p = askCanvasPoint(e, canvas);
    askBrushCtx.beginPath();
    askBrushCtx.moveTo(askLastX, askLastY);
    askBrushCtx.lineTo(p.x, p.y);
    askBrushCtx.lineCap = "round";
    askBrushCtx.lineJoin = "round";
    if (askTool === "eraser") { askBrushCtx.globalCompositeOperation = "destination-out"; askBrushCtx.lineWidth = 20; }
    else { askBrushCtx.globalCompositeOperation = "source-over"; askBrushCtx.strokeStyle = "#2563eb"; askBrushCtx.lineWidth = 3; }
    askBrushCtx.stroke();
    askLastX = p.x; askLastY = p.y; askBrushHasContent = true;
  };
  const end = () => { askDrawing = false; };
  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);
}

function drawAskBase(baseUrl) {
  const area = document.getElementById("ask-brush-area");
  const canvas = document.getElementById("ask-brush-canvas");
  if (!area || !canvas) return;
  area.classList.remove("hidden");
  initAskBrushCanvas();
  askBrushCtx = canvas.getContext("2d");
  askBrushCtx.clearRect(0, 0, canvas.width, canvas.height);
  askBrushCtx.fillStyle = "#fff";
  askBrushCtx.fillRect(0, 0, canvas.width, canvas.height);
  askBrushBaseUrl = baseUrl || null;
  if (!baseUrl) {
    askBrushCtx.fillStyle = "#64748b";
    askBrushCtx.font = "15px sans-serif";
    askBrushCtx.fillText("可在此直接畫圖、寫公式或標註卡關處。", 24, 38);
    askBrushHasContent = true;
    return;
  }
  const img = new Image();
  img.onload = () => {
    askBrushCtx.clearRect(0, 0, canvas.width, canvas.height);
    askBrushCtx.fillStyle = "#fff";
    askBrushCtx.fillRect(0, 0, canvas.width, canvas.height);
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const w = img.width * scale, h = img.height * scale;
    askBrushCtx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
    askBrushHasContent = true;
  };
  img.src = baseUrl;
}

function handleAskImageUpload(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) { alert("請選擇圖片檔案！"); return; }
  const reader = new FileReader();
  reader.onload = () => { askImageDataUrl = reader.result; drawAskBase(askImageDataUrl); };
  reader.readAsDataURL(file);
}
function openAskBrushCanvas() { drawAskBase(askImageDataUrl || askBrushBaseUrl || null); }
function setAskTool(tool) {
  askTool = tool;
  const pen = document.getElementById("ask-tool-pen");
  const eraser = document.getElementById("ask-tool-eraser");
  if (pen && eraser) {
    pen.className = "px-md py-xs border rounded-lg font-label-md text-label-md " + (tool === "pen" ? "border-blue-500 text-blue-600 bg-blue-50" : "border-outline-variant text-secondary");
    eraser.className = "px-md py-xs border rounded-lg font-label-md text-label-md " + (tool === "eraser" ? "border-blue-500 text-blue-600 bg-blue-50" : "border-outline-variant text-secondary");
  }
}
function clearAskCanvas() { drawAskBase(askBrushBaseUrl); }
function removeAskImage() {
  askImageDataUrl = null; askBrushBaseUrl = null; askBrushHasContent = false;
  const input = document.getElementById("ask-image-upload"); if (input) input.value = "";
  const area = document.getElementById("ask-brush-area"); if (area) area.classList.add("hidden");
}
function getAskAttachmentImage() {
  const area = document.getElementById("ask-brush-area");
  const canvas = document.getElementById("ask-brush-canvas");
  if (area && canvas && !area.classList.contains("hidden") && askBrushHasContent) return canvas.toDataURL("image/png");
  return null;
}

document.addEventListener("DOMContentLoaded", initAskBrushCanvas);

function submitQuestion() {
    try {
        const title = document.getElementById("ask-title").value.trim();
        const boardSelect = document.getElementById("ask-board");
        const boardName = boardSelect.options[boardSelect.selectedIndex].textContent.trim();
        const deptName = document.getElementById("ask-dept").value;
        const bounty = parseInt(document.getElementById("ask-bounty").value, 10) || 10;
        const content = document.getElementById("ask-content").value.trim();
        const imageAttachment = getAskAttachmentImage();

        if (!title) {
            alert("請輸入提問主題！");
            return;
        }
        if (!content) {
            alert("請輸入問題描述內容！");
            return;
        }

        // Get custom posts
        let posts = localStorage.getItem("studypet_custom_posts");
        posts = posts ? JSON.parse(posts) : [];

        const newPost = {
            id: "post-" + Date.now(),
            boardId: boardSelect.value,
            title: title,
            authorName: (JSON.parse(localStorage.getItem("studypet_user") || "{}").username) || "新同學",
            boardName: boardName,
            deptName: deptName,
            content: content,
            bounty: bounty,
            solved: false,
            timestamp: new Date().toLocaleString(),
            image: imageAttachment
        };

        // Prepend new post
        posts.unshift(newPost);
        localStorage.setItem("studypet_custom_posts", JSON.stringify(posts));

        // 同步到主頁使用的 studypet_boards，避免主頁與 Stitch 討論版資料不同步
        try {
            const boards = JSON.parse(localStorage.getItem("studypet_boards") || "{}");
            if (boards[newPost.boardId] && Array.isArray(boards[newPost.boardId].posts)) {
                const rootPost = {
                    id: newPost.id,
                    boardId: newPost.boardId,
                    title: newPost.title,
                    author: newPost.authorName,
                    timestamp: newPost.timestamp,
                    bounty: newPost.bounty,
                    solved: false,
                    image: imageAttachment,
                    tags: [newPost.boardName, newPost.deptName].filter(Boolean),
                    content: newPost.content,
                    department: newPost.deptName,
                    replies: []
                };
                boards[newPost.boardId].posts.unshift(rootPost);
                localStorage.setItem("studypet_boards", JSON.stringify(boards));
            }
        } catch (syncErr) {
            console.warn("主頁看板同步失敗，但討論版貼文已儲存。", syncErr);
        }

        // Award +5 coins to user
        let pet = JSON.parse(localStorage.getItem("studypet_pet") || "{\"coins\":120,\"hp\":500}");
        pet.coins = Number(pet.coins || 0) + 5;
        pet.lastActivityTime = Date.now();
        pet.baseHp = pet.hp || 500;
        localStorage.setItem("studypet_pet", JSON.stringify(pet));
        if (window.syncPetScholarCoins) window.syncPetScholarCoins();

        // Increment user qaCount
        let user = JSON.parse(localStorage.getItem("studypet_user")) || { qaCount: 0 };
        user.qaCount = (user.qaCount || 0) + 1;
        // Check for level up if qaCount is multiple of 3
        if (user.qaCount % 3 === 0) {
            user.level = (user.level || 1) + 1;
            alert(`恭喜！您的提問數量達到 ${user.qaCount} 個，等級提升為 Lv. ${user.level}！`);
        }
        localStorage.setItem("studypet_user", JSON.stringify(user));

        alert("發佈提問成功！獲得 5 金幣系統提問獎勵！");
        window.location.href = "../_5/code.html?board=" + encodeURIComponent(boardName);
    } catch(e) {
        console.error("Error submitting question:", e);
        alert("發佈失敗，請重試！");
    }
}

function cancelAsk() {
    window.location.href = "../_5/code.html";
}
</script>

    let pet;
    try { pet = JSON.parse(localStorage.getItem("studypet_pet") || "{}"); } catch (e) { pet = {}; }

    if (!pet.hp) pet.hp = 500;
    if (!pet.maxHp) pet.maxHp = 500;

  function syncCoins() {
    const pet = readPet();
    const coins = Number(pet.coins) || 0;

    document.querySelectorAll(".global-coin-display, [data-coin-balance]").forEach(el => {
      el.textContent = coins;
    });

    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent || ["SCRIPT", "STYLE", "TEXTAREA", "INPUT", "OPTION"].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    let node;
    while ((node = walker.nextNode())) {
      const text = node.nodeValue;
      if (/金幣\s*[:：]\s*\d+/.test(text)) {
        node.nodeValue = text.replace(/(金幣\s*[:：]\s*)\d+/, `$1${coins}`);
      } else if (/餘額\s*[:：]\s*\d+\s*枚?金幣/.test(text)) {
        node.nodeValue = text.replace(/(餘額\s*[:：]\s*)\d+(\s*枚?金幣)/, `$1${coins}$2`);
      } else if (/Coins\s*[:：]\s*\d+/i.test(text)) {
        node.nodeValue = text.replace(/(Coins\s*[:：]\s*)\d+/i, `$1${coins}`);
      }
    }

    // 個人檔案統計卡：總金幣 / Coins
    document.querySelectorAll(".bg-surface.rounded-lg.p-md, .bg-surface-container-lowest, .bg-surface-container-high, .rounded-lg").forEach(card => {
      const label = Array.from(card.querySelectorAll("span,p,div")).find(el => /總金幣|目前金幣|Coins/.test(el.textContent || ""));
      if (!label) return;
      const candidates = Array.from(card.querySelectorAll(".text-on-surface, .text-primary, .font-bold, span, p")).filter(el => /^\d+$/.test((el.textContent || "").trim()));
      if (candidates[0]) candidates[0].textContent = coins;
    });
  }

  const originalSetItem = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSetItem.apply(this, arguments);
    if (key === "studypet_pet") setTimeout(syncCoins, 0);
  };

  window.syncPetScholarCoins = syncCoins;
  document.addEventListener("DOMContentLoaded", syncCoins);
  window.addEventListener("pageshow", syncCoins);
  window.addEventListener("storage", e => { if (e.key === "studypet_pet") syncCoins(); });
})();
</script>


<script id="petscholar-nav-cleanup">
document.addEventListener("DOMContentLoaded", () => {
  const applyNavCleanup = () => {
    document.querySelectorAll('a').forEach(a => {
      if ((a.textContent || '').trim().includes('資料結構')) {
        const li = a.closest('li');
        if (li) li.remove();
        else a.remove();
      }
    });
  };
  applyNavCleanup();
  setTimeout(applyNavCleanup, 80);
  setTimeout(applyNavCleanup, 300);
});
</script>
</body>
