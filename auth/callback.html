<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetScholar Auth Callback</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; background:#faf9fa; color:#1b1c1d; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { max-width: 560px; background:white; border:1px solid #ddd; border-radius:16px; padding:28px; box-shadow:0 12px 32px rgba(0,0,0,.08); }
    code { background:#f1f1f1; padding:2px 6px; border-radius:6px; }
    a, button { display:inline-block; margin-top:18px; background:#4b6172; color:white; padding:10px 16px; border-radius:10px; text-decoration:none; border:0; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>登入回呼已收到</h1>
    <p id="status">正在讀取登入結果...</p>
    <p>若這是北科校園入口或標準 OAuth <code>code</code> flow，正式環境還需要後端把授權碼交換成 token 並驗證身分。</p>
    <a href="../stitch_studypet_village%202/_1/code.html">返回登入頁</a>
  </div>
<script>
(function(){
  const params = new URLSearchParams(location.search || location.hash.replace(/^#/, '?'));
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  const status = document.getElementById('status');
  if (error) {
    status.textContent = '登入失敗：' + error;
    return;
  }
  if (code) {
    sessionStorage.setItem('petscholar_last_auth_code', code);
    status.innerHTML = '已收到授權碼。正式串接時，請由後端使用此 <code>code</code> 向身分提供者交換 token。';
    return;
  }
  status.textContent = '沒有收到可辨識的登入資料。';
})();
</script>
</body>
</html>
